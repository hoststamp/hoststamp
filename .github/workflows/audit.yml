name: Audit

on:
  workflow_dispatch:
  schedule:
    # Weekly — catches advisories published against deps that didn't change,
    # which a push/PR-only trigger would miss until the next code change.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
        with:
          version: 2026.5.16
          sha256: fb2d7bf1a3751398a5c336a3565cd3c60af9b41952abe6fd62e2f2f0d5f06b60
          install: true
          install_args: --locked
          cache: true

      - name: Audit Rust dependencies
        run: mise run audit
