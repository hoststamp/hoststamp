name: Audit

on:
  workflow_dispatch:
  schedule:
    # Weekly — catches advisories published against deps that didn't change,
    # which a push/PR-only trigger would miss until the next code change.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
        with:
          version: 2026.5.4
          sha256: 96a0eefa1ad8c92461c808e6e07644f95cda830d7719895b98c819c94b0e0b1c
          install: true
          install_args: --locked
          cache: true

      - name: Audit Rust dependencies
        run: mise run audit
