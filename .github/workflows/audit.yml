name: Audit

on:
  workflow_dispatch:
  schedule:
    # Weekly — catches advisories published against deps that didn't change,
    # which a push/PR-only trigger would miss until the next code change.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
        with:
          version: 2026.6.6
          sha256: b8c25ad5e1c178bb7ba1e0fca9066153f8ef1b28bf5a8456c20a8acd2522e556
          install: true
          cache: true

      - name: Audit Rust dependencies
        run: mise run audit
