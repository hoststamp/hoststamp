name: Audit

on:
  workflow_dispatch:
  schedule:
    # Weekly — catches advisories published against deps that didn't change,
    # which a push/PR-only trigger would miss until the next code change.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          version: 2026.6.6
          sha256: b8c25ad5e1c178bb7ba1e0fca9066153f8ef1b28bf5a8456c20a8acd2522e556
          install: false
          cache: true

      - name: Install project tools
        run: mise install

      - name: Audit Rust dependencies
        run: mise run audit
