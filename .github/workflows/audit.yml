name: Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly — catches advisories published against deps that didn't change,
    # which a push/PR-only trigger would miss until the next code change.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # rustsec/audit-check opens an issue for new advisories on push/schedule
      # and annotates the PR check on pull_request.
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
