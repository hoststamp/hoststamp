name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PRs (rapid pushes). For main, let every run finish
  # so each merge produces its own nightly image and `:sha-<short>` tag.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          version: 2026.6.6
          sha256: b8c25ad5e1c178bb7ba1e0fca9066153f8ef1b28bf5a8456c20a8acd2522e556
          install: false
          cache: true

      - name: Install project tools
        run: mise install

      - name: Install Rust components
        run: rustup component add rustfmt clippy llvm-tools-preview

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Format
        run: mise run fmt

      - name: Clippy
        run: mise run clippy

      - name: Lint workflows
        run: mise run workflow-lint

      - name: Audit Rust dependencies
        if: ${{ !cancelled() }}
        run: mise run audit

      - name: Scan for leaked secrets
        if: ${{ !cancelled() }}
        run: mise run secret-scan

      - name: Scan filesystem security posture
        if: ${{ !cancelled() }}
        run: mise run security-scan

      - name: UX JavaScript tests
        run: mise run ux-test

      - name: Third-party notices drift
        run: cargo test -p hoststamp-core notices::tests::third_party_notices_are_current --lib

      - name: Test + coverage gate
        # cargo-llvm-cov is pinned in mise.toml. It builds instrumented test
        # binaries, runs them, and fails the job if line coverage drops below
        # the threshold. Raise the threshold here when coverage goes up; do not
        # lower it without recording why.
        run: mise run coverage

      - name: Build (release)
        run: mise run build

      - name: Native package smoke
        env:
          TAG: v0.0.0
          ASSET: linux-amd64
        shell: bash
        run: |
          set -euo pipefail
          out_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/hoststamp-native-package.XXXXXX")"
          sh scripts/package-native-asset.sh "$TAG" "$ASSET" "$out_dir"

          name="hoststamp-${TAG}-${ASSET}"
          archive="$out_dir/$name.tar.gz"
          manifest="$out_dir/archive-files.txt"
          tar -tzf "$archive" | sort > "$manifest"
          grep -Fx "$name/hoststamp" "$manifest" >/dev/null
          grep -Fx "$name/README.md" "$manifest" >/dev/null
          grep -Fx "$name/LICENSE" "$manifest" >/dev/null
          grep -Fx "$name/THIRD-PARTY-NOTICES.md" "$manifest" >/dev/null

          extract_dir="$out_dir/extract"
          mkdir "$extract_dir"
          tar -C "$extract_dir" -xzf "$archive"
          "$extract_dir/$name/hoststamp" --version

          (
            cd "$out_dir"
            shasum -a 256 -- ./*.tar.gz | sed 's#  \./#  #' > "hoststamp-${TAG}-checksums.txt"
            shasum -a 256 -c "hoststamp-${TAG}-checksums.txt"
          )

  locked-tools-macos:
    name: locked platform tools (${{ matrix.platform }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-latest
            mise_sha256: 82abeb5b3cdb377efa31ca83650bd4156d266980b6f2bc7fa4d09610330cc549
          - platform: macos-x64
            runner: macos-15-intel
            mise_sha256: 97fa76dc36b056c4c6e1f88f33e30187f9f1e387b98800eb985c1d0c7fa20084
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install locked platform tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          version: 2026.6.6
          sha256: ${{ matrix.mise_sha256 }}
          install: true
          # Rust and cargo-installed tools are version-locked but do not emit
          # platform URL entries in mise.lock. This job validates the tools that
          # do carry per-platform URLs and checksums.
          install_args: --locked node actionlint gitleaks trivy watchexec shellcheck
          cache: true

  docker:
    name: docker build
    # PR-only amd64 smoke build: proves the Dockerfile still builds, fast (native,
    # no QEMU). arm64 is built and pushed at merge by publish-nightly, which runs
    # the full multi-arch build. Emulating a full Rust release compile for arm64
    # under QEMU here costs ~15 min/commit and is not worth it per PR push; the
    # tradeoff is that an arm64-only Dockerfile/base-image break surfaces at merge.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build image (amd64, no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: hoststamp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: sh scripts/docker-smoke.sh hoststamp:ci hoststamp-ci hoststamp-ci-data 18080
