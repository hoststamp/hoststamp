name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable release version, for example 0.2.0 or v0.2.0
        required: true
        type: string
      dry_run:
        description: Verify without tagging, publishing, or creating a GitHub release
        required: true
        default: false
        type: boolean

concurrency:
  group: ghcr-publish
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      major: ${{ steps.release.outputs.major }}
      major_tag: ${{ steps.release.outputs.major_tag }}
      minor_tag: ${{ steps.release.outputs.minor_tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release version
        id: release
        env:
          RAW_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "stable releases must run from main, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          raw_version="$RAW_VERSION"
          version="${raw_version#v}"
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "version must be stable X.Y.Z or vX.Y.Z, got $raw_version" >&2
            exit 1
          fi

          current="$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)"
          if [[ "$version" != "$current" ]]; then
            echo "requested version $version does not match Cargo.toml version $current" >&2
            exit 1
          fi

          git fetch origin main --tags
          head_sha="$(git rev-parse HEAD)"
          remote_main="$(git rev-parse origin/main)"
          if [[ "$head_sha" != "$remote_main" ]]; then
            echo "release checkout must match origin/main before publishing" >&2
            exit 1
          fi

          tag="v$version"
          major="${version%%.*}"
          minor_patch="${version#*.}"
          minor="${minor_patch%%.*}"

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/tmp/remote-tag 2>/dev/null; then
            peeled_sha="$(git ls-remote --tags origin "refs/tags/$tag^{}" | awk '{ print $1 }')"
            if [[ -z "$peeled_sha" ]]; then
              peeled_sha="$(awk '{ print $1 }' /tmp/remote-tag)"
            fi
            if [[ "$peeled_sha" != "$head_sha" ]]; then
              echo "remote tag $tag already exists at $peeled_sha, not $head_sha" >&2
              exit 1
            fi
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "major=$major"
            echo "major_tag=v$major"
            echo "minor_tag=v$major.$minor"
          } >> "$GITHUB_OUTPUT"

  native-assets:
    name: native asset (${{ matrix.asset }})
    needs: prepare
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: linux-amd64
            runner: ubuntu-latest
            mise_sha256: b8c25ad5e1c178bb7ba1e0fca9066153f8ef1b28bf5a8456c20a8acd2522e556
          - asset: macos-arm64
            runner: macos-latest
            mise_sha256: 82abeb5b3cdb377efa31ca83650bd4156d266980b6f2bc7fa4d09610330cc549
          - asset: macos-x64
            runner: macos-15-intel
            mise_sha256: 97fa76dc36b056c4c6e1f88f33e30187f9f1e387b98800eb985c1d0c7fa20084
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
        with:
          version: 2026.6.6
          sha256: ${{ matrix.mise_sha256 }}
          install: false
          cache: true

      - name: Install Rust
        run: mise install rust

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Build release binary
        run: cargo build --release --locked -p hoststamp

      - name: Package native asset
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          ASSET: ${{ matrix.asset }}
        shell: bash
        run: |
          set -euo pipefail
          sh scripts/package-native-asset.sh "$TAG" "$ASSET" dist

      - name: Upload native asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: hoststamp-native-${{ matrix.asset }}
          path: dist/hoststamp-${{ needs.prepare.outputs.tag }}-${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  release:
    name: stable release
    needs: [prepare, native-assets]
    runs-on: ubuntu-latest
    environment: stable-release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release metadata
        id: release
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          MAJOR: ${{ needs.prepare.outputs.major }}
          MAJOR_TAG: ${{ needs.prepare.outputs.major_tag }}
          MINOR_TAG: ${{ needs.prepare.outputs.minor_tag }}
        shell: bash
        run: |
          set -euo pipefail

          # Re-check the time-sensitive publish guards after native asset
          # builds finish. Version and SemVer validation are single-sourced in
          # the prepare job above.
          git fetch origin main --tags
          head_sha="$(git rev-parse HEAD)"
          remote_main="$(git rev-parse origin/main)"
          if [[ "$head_sha" != "$remote_main" ]]; then
            echo "release checkout must match origin/main before publishing" >&2
            exit 1
          fi

          tag_exists=false
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/tmp/remote-tag 2>/dev/null; then
            peeled_sha="$(git ls-remote --tags origin "refs/tags/$TAG^{}" | awk '{ print $1 }')"
            if [[ -z "$peeled_sha" ]]; then
              peeled_sha="$(awk '{ print $1 }' /tmp/remote-tag)"
            fi
            if [[ "$peeled_sha" != "$head_sha" ]]; then
              echo "remote tag $TAG already exists at $peeled_sha, not $head_sha" >&2
              exit 1
            fi
            tag_exists=true
          fi

          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "major=$MAJOR"
            echo "major_tag=$MAJOR_TAG"
            echo "minor_tag=$MINOR_TAG"
            echo "tag_exists=$tag_exists"
          } >> "$GITHUB_OUTPUT"

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
        with:
          version: 2026.6.6
          sha256: b8c25ad5e1c178bb7ba1e0fca9066153f8ef1b28bf5a8456c20a8acd2522e556
          install: false
          cache: true

      - name: Install project tools
        run: mise install

      - name: Install Rust components
        run: rustup component add rustfmt clippy llvm-tools-preview

      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Run release checks
        run: mise run ci

      - name: Verify release workflow did not change source
        run: git diff --exit-code

      - name: Verify release git credentials
        if: ${{ steps.release.outputs.tag_exists == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git push --dry-run "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/tags/$TAG"

      - name: Download native assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: hoststamp-native-*
          path: release-assets
          merge-multiple: true

      - name: Generate native asset checksums
        env:
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          checksum_file="release-assets/hoststamp-${TAG}-checksums.txt"
          (
            cd release-assets
            shasum -a 256 -- ./*.tar.gz | sed 's#  \./#  #' > "hoststamp-${TAG}-checksums.txt"
          )
          cat "$checksum_file"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
        with:
          platforms: arm64

      - name: Build arm64 smoke image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/arm64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --load \
            --tag hoststamp:release-smoke-arm64 \
            .

      - name: Smoke test arm64 image
        run: sh scripts/docker-smoke.sh hoststamp:release-smoke-arm64 hoststamp-release-arm64-smoke hoststamp-release-arm64-smoke-data 18081

      - name: Log in to GHCR
        if: ${{ inputs.dry_run == false }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=${{ steps.release.outputs.minor_tag }}
            type=raw,value=${{ steps.release.outputs.major_tag }},enable=${{ steps.release.outputs.major != '0' }}

      - name: Build and publish image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.dry_run == false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create stable release tag
        if: ${{ inputs.dry_run == false && steps.release.outputs.tag_exists == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$TAG"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$tag"

      - name: Reuse existing stable release tag
        if: ${{ inputs.dry_run == false && steps.release.outputs.tag_exists == 'true' }}
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: echo "Reusing $TAG at this commit."

      - name: Create GitHub release
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$TAG"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes "Release $tag"
          else
            gh release create "$tag" --verify-tag --title "$tag" --notes "Release $tag"
          fi

      - name: Upload native release assets
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$TAG" release-assets/*.tar.gz "release-assets/hoststamp-${TAG}-checksums.txt" --clobber

      - name: Report dry run
        if: ${{ inputs.dry_run }}
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: echo "Dry run completed for $TAG."
