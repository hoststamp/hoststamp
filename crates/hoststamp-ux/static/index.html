<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hoststamp</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --ink: #1b1f24;
        --muted: #5f6875;
        --line: #d9dee7;
        --accent: #0f766e;
        --accent-ink: #f0fdfa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        min-height: 4rem;
        padding: 0 1.25rem;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 700;
      }

      .mark {
        width: 2rem;
        height: 2rem;
        display: grid;
        place-items: center;
        border-radius: 0.375rem;
        background: var(--accent);
        color: var(--accent-ink);
        font-weight: 800;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        min-height: 2rem;
        padding: 0 0.75rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.875rem;
        white-space: nowrap;
      }

      .dot {
        width: 0.625rem;
        height: 0.625rem;
        border-radius: 999px;
        background: #9aa4b2;
      }

      .dot.ok {
        background: #16a34a;
      }

      main {
        width: min(64rem, 100%);
        margin: 0 auto;
        padding: 2rem 1.25rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
      }

      .panel {
        min-height: 8rem;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        background: var(--panel);
      }

      .panel h2 {
        margin: 0 0 0.75rem;
        font-size: 0.875rem;
        font-weight: 700;
      }

      .metric {
        margin: 0;
        font-size: 1.875rem;
        font-weight: 750;
      }

      .muted {
        color: var(--muted);
        font-size: 0.875rem;
      }

      @media (max-width: 720px) {
        header {
          align-items: flex-start;
          flex-direction: column;
          padding: 1rem;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="brand">
          <div class="mark" aria-hidden="true">H</div>
          <span>Hoststamp</span>
        </div>
        <div class="status" aria-live="polite">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">Checking API</span>
        </div>
      </header>
      <main>
        <section class="grid" aria-label="Hoststamp status">
          <article class="panel">
            <h2>API</h2>
            <p class="metric" id="api-state">--</p>
            <p class="muted">Local service health</p>
          </article>
          <article class="panel">
            <h2>Service</h2>
            <p class="metric">hoststamp</p>
            <p class="muted">CLI, API, and UX runtime</p>
          </article>
          <article class="panel">
            <h2>Endpoint</h2>
            <p class="metric">/api</p>
            <p class="muted">Server routes namespace</p>
          </article>
        </section>
      </main>
    </div>
    <script>
      async function refreshHealth() {
        const dot = document.getElementById("status-dot");
        const text = document.getElementById("status-text");
        const state = document.getElementById("api-state");

        try {
          const response = await fetch("/api/health", { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          dot.classList.add("ok");
          text.textContent = `${payload.service} online`;
          state.textContent = payload.status;
        } catch {
          dot.classList.remove("ok");
          text.textContent = "API offline";
          state.textContent = "--";
        }
      }

      refreshHealth();
      setInterval(refreshHealth, 5000);
    </script>
  </body>
</html>
