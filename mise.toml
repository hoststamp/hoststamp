[settings]
lockfile = true

[tools]
# `default` rustup profile is NOT used; mise installs minimal. rustfmt + clippy
# are needed by CI's fmt/clippy steps, llvm-tools-preview by cargo-llvm-cov.
rust = { version = "1.96.0", components = "rustfmt,clippy,llvm-tools-preview" }
node = "26"
"cargo:cargo-llvm-cov" = "0.8.7"
"cargo:cargo-audit" = "0.22.2"
"cargo:cargo-edit" = "0.13.11"
actionlint = "1.7.12"
gitleaks = "8.30.1"
trivy = "0.71.0"
watchexec = "2.5.1"
# actionlint shells out to shellcheck for `run:` blocks. Pin it so local
# `actionlint` matches CI (GitHub runners have shellcheck preinstalled).
shellcheck = "0.11.0"

[tasks.fmt]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Run Rust lints"
run = "cargo clippy --all-targets -- -D warnings"

[tasks.test]
description = "Run all Rust tests"
run = "cargo test --all-targets"

[tasks.ux-test]
description = "Run local UX JavaScript tests"
run = "node --test crates/hoststamp-ux/tests/*.test.js"

[tasks.check]
description = "Run fast Rust type checks"
run = "cargo check --all-targets"

[tasks.dev]
description = "Run the local API and UX server, restarting when source files change"
run = "sh scripts/dev-env.sh watchexec --restart --clear --watch Cargo.toml --watch Cargo.lock --watch crates --ignore 'crates/hoststamp-ux/static/**' -- cargo run -p hoststamp -- serve"

[tasks.dev-api]
description = "Run the local API server, restarting when source files change"
run = "sh scripts/dev-env.sh watchexec --restart --clear --watch Cargo.toml --watch Cargo.lock --watch crates --ignore 'crates/hoststamp-ux/static/**' -- cargo run -p hoststamp -- serve --mode api"

[tasks.dev-ux]
description = "Run the local UX server, restarting when source files change"
run = "sh scripts/dev-env.sh watchexec --restart --clear --watch Cargo.toml --watch Cargo.lock --watch crates --ignore 'crates/hoststamp-ux/static/**' -- cargo run -p hoststamp -- serve --mode ux"

[tasks.dev-reset]
description = "Delete the throwaway local development state"
run = "rm -f target/dev/hoststamp.db target/dev/hoststamp.db-shm target/dev/hoststamp.db-wal target/dev/admin-token target/dev/token-hash-key"

[tasks.dev-token]
description = "Print the local development admin token"
run = "sh scripts/dev-env.sh --print-admin-token"

[tasks.watch-check]
description = "Run fast Rust type checks whenever source files change"
run = "watchexec --clear --watch Cargo.toml --watch Cargo.lock --watch crates --ignore 'crates/hoststamp-ux/static/**' -- cargo check --all-targets"

[tasks.coverage]
description = "Run tests with the 90% line coverage gate"
run = "cargo llvm-cov --all-targets --locked --summary-only --fail-under-lines 90"

[tasks.workflow-lint]
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks.audit]
description = "Scan Rust dependencies for security advisories"
run = "cargo audit"

[tasks.secret-scan]
description = "Scan committed history for leaked secrets"
run = "gitleaks detect --source . --redact --no-banner"

[tasks.security-scan]
description = "Scan the filesystem for high-severity vulnerabilities and misconfigurations"
run = "trivy fs --scanners vuln,misconfig --severity HIGH,CRITICAL --exit-code 1 --skip-dirs target --skip-dirs .git --no-progress ."

[tasks.build]
description = "Build the release binary"
run = "cargo build --release --locked"

[tasks.docker-build]
description = "Build the development Docker image"
run = "docker build -t hoststamp:dev ."

[tasks.docker-smoke]
description = "Run the Docker image with hardened runtime flags and check health"
depends = ["docker-build"]
run = "sh scripts/docker-smoke.sh hoststamp:dev hoststamp-smoke hoststamp-smoke-data 18080"

[tasks.release-prep]
description = "Create a release prep branch, version bump commit, and PR"
run = "sh scripts/release-prep.sh"

[tasks.release-publish]
description = "Dispatch the stable release workflow for the current version"
run = "sh scripts/release-publish.sh"

[tasks.ci]
description = "Run the main local CI checks"
depends = [
    "fmt",
    "clippy",
    "workflow-lint",
    "audit",
    "secret-scan",
    "security-scan",
    "test",
    "ux-test",
    "coverage",
    "build",
]
